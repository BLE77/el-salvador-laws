app = 'el-salvador-laws'
primary_region = 'dfw'  # Dallas

[build]

[env]
  PORT = '8080'
  DB_PATH = '/data/db/laws.db'
  WIKI_DIR = '/data/wiki'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[mounts]
  source = 'law_data'
  destination = '/data/db'
